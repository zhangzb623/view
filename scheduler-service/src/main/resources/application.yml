server:
  port: 8087

spring:
  application:
    name: scheduler-service
  profiles:
    active: dev

  # MongoDB配置
  data:
    mongodb:
      uri: mongodb://localhost:27017/learning_scheduler
      database: learning_scheduler

  # xxl-job配置
  xxl:
    job:
      admin:
        addresses: http://localhost:8080/xxl-job-admin
      executor:
        appname: scheduler-service
        ip:
        port: 9999
        logpath: /data/applogs/xxl-job/jobhandler
        logretentiondays: 30
      accessToken: ''

  # MyBatis Plus配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.learning.scheduler.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    com.learning.scheduler: DEBUG
    com.xuxueli: INFO
    org.mongodb: DEBUG
