server:
  port: 8082

spring:
  application:
    name: user-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/user_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password: root
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

  # MyBatis Plus配置
  mybatis-plus:
    mapper-locations: classpath:mapper/**/*.xml
    type-aliases-package: com.learning.user.entity
    configuration:
      map-underscore-to-camel-case: true
      cache-enabled: true
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
      db-config:
        id-type: auto
        logic-delete-field: deleted
        logic-delete-value: 1
        logic-not-delete-value: 0
      banner: false

# 服务注册配置
spring:
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: learning-system
        group: LEARNING_GROUP
        service: user-service

# JWT配置
jwt:
  secret: learning-system-secret-key-2024
  expiration: 7200000  # 2小时
  header: Authorization

# 日志配置
logging:
  level:
    com.learning: DEBUG

# Actuator配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
